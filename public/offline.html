<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – LottoCrew</title>
  <style>
    /* Passend zum App-Design: cremiger Hintergrund, Amber-Akzent, runde Karten */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #faf7f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #0f172a;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 28px;
      box-shadow: 0 18px 45px rgba(26, 29, 36, 0.1);
      padding: 40px 32px;
      max-width: 420px;
      text-align: center;
    }
    .ball {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 28%, #fde68a, #f59e0b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
    }
    h1 { font-size: 22px; margin: 0 0 10px; }
    p { font-size: 15px; line-height: 1.6; color: #64748b; margin: 0 0 24px; }
    button {
      background: #fbbf24;
      color: #020617;
      border: none;
      border-radius: 16px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      box-shadow: 0 14px 32px rgba(232, 166, 0, 0.28);
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <div class="ball">📡</div>
    <h1>Keine Internetverbindung</h1>
    <p>LottoCrew braucht eine Verbindung, um eure aktuellen Tipps und Beiträge zu laden. Sobald du wieder online bist, einfach neu laden.</p>
    <button onclick="location.reload()">Neu laden</button>
  </div>
</body>
</html>
